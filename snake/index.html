<!DOCTYPE html>
<html>
<head>
  <title>Snake</title>
  <style>
    body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: monospace; color: #fff; transition: background 0.2s, color 0.2s; }
    body.light { background: #fdf6e3; color: #657b83; }
    canvas { border: 2px solid #333; }
    body.light canvas { border-color: #93a1a1; }
    #score { margin-bottom: 10px; font-size: 20px; }
    #msg { margin-top: 10px; font-size: 14px; color: #888; }
    body.light #msg { color: #93a1a1; }
    #theme-btn { margin-bottom: 12px; padding: 4px 14px; cursor: pointer; font-family: monospace; font-size: 13px; background: #222; color: #ccc; border: 1px solid #444; border-radius: 4px; }
    body.light #theme-btn { background: #eee8d5; color: #586e75; border-color: #93a1a1; }
  </style>
</head>
<body>
  <button id="theme-btn" onclick="toggleTheme()">☀ Solarized Light</button>
  <div id="score">Score: 0</div>
  <canvas id="c" width="400" height="400"></canvas>
  <div id="msg">Arrow keys to move • Press any key to restart</div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const SIZE = 20, COLS = 20, ROWS = 20;
    let snake, dir, food, score, interval, running, light = false;

    const THEMES = {
      dark:  { bg: '#111', food: '#dc322f', head: '#859900', body: '#586e75', over: 'rgba(0,0,0,0.5)', overText: '#f55' },
      light: { bg: '#fdf6e3', food: '#dc322f', head: '#859900', body: '#93a1a1', over: 'rgba(253,246,227,0.7)', overText: '#cb4b16' }
    };

    function theme() { return light ? THEMES.light : THEMES.dark; }

    function toggleTheme() {
      light = !light;
      document.body.classList.toggle('light', light);
      document.getElementById('theme-btn').textContent = light ? '🌙 Dark Mode' : '☀ Solarized Light';
      draw();
    }

    function start() {
      snake = [{x:10, y:10}];
      dir = {x:1, y:0};
      score = 0;
      running = true;
      placeFood();
      draw();
      clearInterval(interval);
      interval = setInterval(tick, 200);
    }

    function placeFood() {
      do {
        food = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
      } while (snake.some(s => s.x===food.x && s.y===food.y));
    }

    function tick() {
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
      if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
        clearInterval(interval);
        running = false;
        draw();
        const t = theme();
        ctx.fillStyle = t.over;
        ctx.fillRect(0,0,400,400);
        ctx.fillStyle = t.overText;
        ctx.font = '36px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', 200, 200);
        return;
      }
      snake.unshift(head);
      if (head.x===food.x && head.y===food.y) {
        score++;
        document.getElementById('score').textContent = 'Score: ' + score;
        placeFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function draw() {
      const t = theme();
      ctx.fillStyle = t.bg;
      ctx.fillRect(0,0,400,400);
      ctx.fillStyle = t.food;
      ctx.fillRect(food.x*SIZE+1, food.y*SIZE+1, SIZE-2, SIZE-2);
      snake.forEach((s, i) => {
        ctx.fillStyle = i===0 ? t.head : t.body;
        ctx.fillRect(s.x*SIZE+1, s.y*SIZE+1, SIZE-2, SIZE-2);
      });
    }

    document.addEventListener('keydown', e => {
      if (!running) { start(); return; }
      const map = {ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0}};
      const d = map[e.key];
      if (d && !(d.x===-dir.x && d.y===-dir.y)) dir = d;
    });

    start();
  </script>
</body>
</html>
