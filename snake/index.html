<!DOCTYPE html>
<html>
<head>
  <title>Snake</title>
  <style>
    body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: monospace; color: #fff; }
    canvas { border: 2px solid #333; }
    #score { margin-bottom: 10px; font-size: 20px; }
    #msg { margin-top: 10px; font-size: 14px; color: #888; }
  </style>
</head>
<body>
  <div id="score">Score: 0</div>
  <canvas id="c" width="400" height="400"></canvas>
  <div id="msg">Arrow keys to move • Press any key to restart</div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const SIZE = 20, COLS = 20, ROWS = 20;
    let snake, dir, food, score, interval, running;

    function start() {
      snake = [{x:10, y:10}];
      dir = {x:1, y:0};
      score = 0;
      running = true;
      placeFood();
      update();
      clearInterval(interval);
      interval = setInterval(tick, 120);
    }

    function placeFood() {
      do {
        food = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
      } while (snake.some(s => s.x===food.x && s.y===food.y));
    }

    function tick() {
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
      if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
        clearInterval(interval);
        running = false;
        draw();
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0,0,400,400);
        ctx.fillStyle = '#f55';
        ctx.font = '36px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', 200, 200);
        return;
      }
      snake.unshift(head);
      if (head.x===food.x && head.y===food.y) {
        score++;
        document.getElementById('score').textContent = 'Score: ' + score;
        placeFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function draw() {
      ctx.fillStyle = '#111';
      ctx.fillRect(0,0,400,400);
      // food
      ctx.fillStyle = '#f55';
      ctx.fillRect(food.x*SIZE+1, food.y*SIZE+1, SIZE-2, SIZE-2);
      // snake
      snake.forEach((s, i) => {
        ctx.fillStyle = i===0 ? '#4f4' : '#2a2';
        ctx.fillRect(s.x*SIZE+1, s.y*SIZE+1, SIZE-2, SIZE-2);
      });
    }

    function update() { draw(); }

    document.addEventListener('keydown', e => {
      if (!running) { start(); return; }
      const map = {ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0}};
      const d = map[e.key];
      if (d && !(d.x===-dir.x && d.y===-dir.y)) dir = d;
    });

    start();
  </script>
</body>
</html>
